name: Supercorner Release

on:
  push:
    tags: ["supercorner-v*"]

concurrency:
  group: supercorner-release-${{ github.ref }}
  cancel-in-progress: false

env:
  PESDE_RELEASE: "v0.7.3+registry.0.2.3"

jobs:
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: supercorner
    steps:
      - uses: actions/checkout@v6

      - name: Install pesde
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          INSTALL_ROOT="$RUNNER_TEMP/pesde"
          mkdir -p "$INSTALL_ROOT" "$INSTALL_ROOT/bin" "$INSTALL_ROOT/extracted"
          gh release download "$PESDE_RELEASE" \
            --repo pesde-pkg/pesde \
            --pattern "*linux-x86_64.zip" \
            --dir "$INSTALL_ROOT"

          ARCHIVE="$(find "$INSTALL_ROOT" -maxdepth 1 -type f -name '*linux-x86_64.zip' -print -quit)"
          if [ -z "$ARCHIVE" ]; then
            echo "::error::Could not find the downloaded pesde archive."
            exit 1
          fi

          unzip -q "$ARCHIVE" -d "$INSTALL_ROOT/extracted"
          PESDE_BIN="$(find "$INSTALL_ROOT/extracted" -type f -name pesde -print -quit)"
          if [ -z "$PESDE_BIN" ]; then
            echo "::error::Could not find the pesde binary in the downloaded archive."
            exit 1
          fi

          install -m 0755 "$PESDE_BIN" "$INSTALL_ROOT/bin/pesde"
          echo "$INSTALL_ROOT/bin" >> "$GITHUB_PATH"
          "$INSTALL_ROOT/bin/pesde" -v

      - name: Check pesde.toml version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          MANIFEST_VERSION="$(sed -n 's/^version = "\([^"]*\)"/\1/p' pesde.toml | head -n 1)"
          TAG_VERSION="${TAG#supercorner-v}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::pesde.toml version ($MANIFEST_VERSION) does not match tag ($TAG). Update the version in pesde.toml before releasing."
            exit 1
          fi

      - name: Check CHANGELOG.md has entry for this version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#supercorner-}"
          if ! grep -q "^# $VERSION$" CHANGELOG.md; then
            echo "::error::No changelog entry found for $VERSION in CHANGELOG.md. Add a '# $VERSION' section before releasing."
            exit 1
          fi

      - name: Refresh lockfile version
        run: |
          cp pesde.lock "$RUNNER_TEMP/pesde.lock.before"
          pesde install

          awk '
            !normalized && /^version = / {
              print "version = \"<root-version>\""
              normalized = 1
              next
            }
            { print }
          ' "$RUNNER_TEMP/pesde.lock.before" > "$RUNNER_TEMP/lock.before"

          awk '
            !normalized && /^version = / {
              print "version = \"<root-version>\""
              normalized = 1
              next
            }
            { print }
          ' pesde.lock > "$RUNNER_TEMP/lock.after"

          if ! diff -u "$RUNNER_TEMP/lock.before" "$RUNNER_TEMP/lock.after"; then
            echo "::error::pesde.lock changed beyond the root package version. Regenerate and review it locally."
            exit 1
          fi

          MANIFEST_VERSION="$(awk -F '"' '/^version = "/ { print $2; exit }' pesde.toml)"
          LOCK_VERSION="$(awk -F '"' '/^version = "/ { print $2; exit }' pesde.lock)"

          if [ "$LOCK_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Regenerated lockfile version ($LOCK_VERSION) does not match pesde.toml ($MANIFEST_VERSION)."
            exit 1
          fi

          echo "pesde.lock dependency resolution is unchanged."

      - name: Build and inspect package archive
        run: |
          pesde publish --dry-run --yes

          {
            printf '%s\n' LICENSE.md README.md pesde.toml
            find src -type f -name '*.luau' -print
          } | LC_ALL=C sort > "$RUNNER_TEMP/expected-package-files.txt"

          tar -tzf package.tar.gz | LC_ALL=C sort > "$RUNNER_TEMP/actual-package-files.txt"
          if ! diff -u "$RUNNER_TEMP/expected-package-files.txt" "$RUNNER_TEMP/actual-package-files.txt"; then
            echo "::error::The pesde archive contains unexpected or missing files."
            exit 1
          fi

  create-release:
    name: Create Draft Release
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          CHANGELOG_VERSION="${TAG#supercorner-}"
          VERSION="${TAG#supercorner-v}"

          CHANGELOG=$(awk -v tag="$CHANGELOG_VERSION" '
            BEGIN { found=0 }
            /^# / {
              if (found) exit
              if ($0 == "# " tag) { found=1; next }
            }
            found { print }
          ' supercorner/CHANGELOG.md | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}')

          if [ -z "$CHANGELOG" ]; then
            echo "::error::No changelog entry found for $CHANGELOG_VERSION in CHANGELOG.md"
            exit 1
          fi

          CHANGELOG=$(printf '%s' "$CHANGELOG" | sed 's/^#/##/')
          PESDE_URL="https://pesde.dev/packages/cameronpcampbell/supercorner"

          cat > /tmp/release_body.md << EOF
          # Changelog
          ${CHANGELOG}

          ---

          # pesde
          [View Supercorner on pesde](${PESDE_URL}).

          \`\`\`sh
          pesde add cameronpcampbell/supercorner@${VERSION}
          \`\`\`

          Or add it directly to \`pesde.toml\`:

          \`\`\`toml
          [dependencies]
          supercorner = { name = "cameronpcampbell/supercorner", version = "^${VERSION}", target = "roblox" }
          \`\`\`
          EOF

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists. Updating."
            gh release edit "$TAG" --draft --title "Supercorner v${VERSION}" --notes-file /tmp/release_body.md
          else
            gh release create "$TAG" --draft --verify-tag --title "Supercorner v${VERSION}" --notes-file /tmp/release_body.md
          fi

  publish-package:
    name: Publish to pesde
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: supercorner
    steps:
      - uses: actions/checkout@v6

      - name: Install pesde
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          INSTALL_ROOT="$RUNNER_TEMP/pesde"
          mkdir -p "$INSTALL_ROOT" "$INSTALL_ROOT/bin" "$INSTALL_ROOT/extracted"
          gh release download "$PESDE_RELEASE" \
            --repo pesde-pkg/pesde \
            --pattern "*linux-x86_64.zip" \
            --dir "$INSTALL_ROOT"

          ARCHIVE="$(find "$INSTALL_ROOT" -maxdepth 1 -type f -name '*linux-x86_64.zip' -print -quit)"
          if [ -z "$ARCHIVE" ]; then
            echo "::error::Could not find the downloaded pesde archive."
            exit 1
          fi

          unzip -q "$ARCHIVE" -d "$INSTALL_ROOT/extracted"
          PESDE_BIN="$(find "$INSTALL_ROOT/extracted" -type f -name pesde -print -quit)"
          if [ -z "$PESDE_BIN" ]; then
            echo "::error::Could not find the pesde binary in the downloaded archive."
            exit 1
          fi

          install -m 0755 "$PESDE_BIN" "$INSTALL_ROOT/bin/pesde"
          echo "$INSTALL_ROOT/bin" >> "$GITHUB_PATH"
          "$INSTALL_ROOT/bin/pesde" -v

      - name: Refresh lockfile version
        run: |
          cp pesde.lock "$RUNNER_TEMP/pesde.lock.before"
          pesde install

          awk '
            !normalized && /^version = / {
              print "version = \"<root-version>\""
              normalized = 1
              next
            }
            { print }
          ' "$RUNNER_TEMP/pesde.lock.before" > "$RUNNER_TEMP/lock.before"

          awk '
            !normalized && /^version = / {
              print "version = \"<root-version>\""
              normalized = 1
              next
            }
            { print }
          ' pesde.lock > "$RUNNER_TEMP/lock.after"

          if ! diff -u "$RUNNER_TEMP/lock.before" "$RUNNER_TEMP/lock.after"; then
            echo "::error::pesde.lock changed beyond the root package version. Regenerate and review it locally."
            exit 1
          fi

          MANIFEST_VERSION="$(awk -F '"' '/^version = "/ { print $2; exit }' pesde.toml)"
          LOCK_VERSION="$(awk -F '"' '/^version = "/ { print $2; exit }' pesde.lock)"

          if [ "$LOCK_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Regenerated lockfile version ($LOCK_VERSION) does not match pesde.toml ($MANIFEST_VERSION)."
            exit 1
          fi

          echo "pesde.lock dependency resolution is unchanged."

      - name: Authenticate with pesde
        env:
          PESDE_TOKEN: ${{ secrets.PESDE_TOKEN }}
        run: |
          if [ -z "$PESDE_TOKEN" ]; then
            echo "::error::The PESDE_TOKEN repository secret is not configured."
            exit 1
          fi

          pesde auth login --token "$PESDE_TOKEN"
          pesde auth whoami

      - name: Publish package
        run: |
          PUBLISH_LOG="$RUNNER_TEMP/pesde-publish.log"
          set -o pipefail

          if pesde publish --yes 2>&1 | tee "$PUBLISH_LOG"; then
            PUBLISH_STATUS=0
          else
            PUBLISH_STATUS=$?
          fi

          if [ "$PUBLISH_STATUS" -ne 0 ]; then
            echo "::error::pesde publish exited with status $PUBLISH_STATUS."
            exit "$PUBLISH_STATUS"
          fi

          if grep -Fq "error occurred publishing" "$PUBLISH_LOG"; then
            echo "::error::pesde reported a publishing error but returned exit code 0."
            exit 1
          fi

  publish-release:
    name: Publish GitHub Release
    needs: publish-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
