name: Supercorner Fusion03 Release

on:
  push:
    tags: ["supercorner-fusion03-v*"]

concurrency:
  group: supercorner-fusion03-release-${{ github.ref }}
  cancel-in-progress: false

env:
  PESDE_RELEASE: "v0.7.3+registry.0.2.3"

jobs:
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: supercorner_fusion03
    steps:
      - uses: actions/checkout@v6

      - name: Install Rokit toolchain
        uses: CompeyDev/setup-rokit@v0.1.2
        with:
          path: supercorner_fusion03

      - name: Install pesde
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          INSTALL_ROOT="$RUNNER_TEMP/pesde"
          mkdir -p "$INSTALL_ROOT" "$INSTALL_ROOT/bin" "$INSTALL_ROOT/extracted"
          gh release download "$PESDE_RELEASE" \
            --repo pesde-pkg/pesde \
            --pattern "*linux-x86_64.zip" \
            --dir "$INSTALL_ROOT"

          ARCHIVE="$(find "$INSTALL_ROOT" -maxdepth 1 -type f -name '*linux-x86_64.zip' -print -quit)"
          if [ -z "$ARCHIVE" ]; then
            echo "::error::Could not find the downloaded pesde archive."
            exit 1
          fi

          unzip -q "$ARCHIVE" -d "$INSTALL_ROOT/extracted"
          PESDE_BIN="$(find "$INSTALL_ROOT/extracted" -type f -name pesde -print -quit)"
          if [ -z "$PESDE_BIN" ]; then
            echo "::error::Could not find the pesde binary in the downloaded archive."
            exit 1
          fi

          install -m 0755 "$PESDE_BIN" "$INSTALL_ROOT/bin/pesde"
          echo "$INSTALL_ROOT/bin" >> "$GITHUB_PATH"

          EXPECTED_VERSION="${PESDE_RELEASE#v}"
          EXPECTED_VERSION="${EXPECTED_VERSION%%+*}"
          ACTUAL_VERSION="$("$INSTALL_ROOT/bin/pesde" -v)"
          if [ "$ACTUAL_VERSION" != "pesde $EXPECTED_VERSION" ]; then
            echo "::error::Expected pesde $EXPECTED_VERSION, got $ACTUAL_VERSION."
            exit 1
          fi
          printf '%s\n' "$ACTUAL_VERSION"

      - name: Verify script runtime
        run: |
          ACTUAL_LUNE="$(lune --version)"
          if [ "$ACTUAL_LUNE" != "lune 0.10.4" ]; then
            echo "::error::Expected lune 0.10.4, got $ACTUAL_LUNE."
            exit 1
          fi
          printf '%s\n' "$ACTUAL_LUNE"

      - name: Check pesde.toml version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          MANIFEST_VERSION="$(sed -n 's/^version = "\([^"]*\)"/\1/p' pesde.toml | head -n 1)"
          TAG_VERSION="${TAG#supercorner-fusion03-v}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::pesde.toml version ($MANIFEST_VERSION) does not match tag ($TAG). Update the version in pesde.toml before releasing."
            exit 1
          fi

      - name: Check CHANGELOG.md has entry for this version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#supercorner-fusion03-}"
          if ! grep -q "^# $VERSION$" CHANGELOG.md; then
            echo "::error::No changelog entry found for $VERSION in CHANGELOG.md. Add a '# $VERSION' section before releasing."
            exit 1
          fi

      - name: Verify locked install
        run: pesde install --locked

      - name: Validate Luau sources
        run: |
          ROBLOX_TYPES="$RUNNER_TEMP/globalTypes.PluginSecurity.d.luau"
          SOURCEMAP="$RUNNER_TEMP/supercorner-fusion03-sourcemap.json"
          ACTUAL_LUAU_LSP="$(luau-lsp --version)"

          if [ "$ACTUAL_LUAU_LSP" != "1.68.1" ]; then
            echo "::error::Expected luau-lsp 1.68.1, got $ACTUAL_LUAU_LSP."
            exit 1
          fi
          printf 'luau-lsp %s\n' "$ACTUAL_LUAU_LSP"

          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
            https://luau-lsp.pages.dev/type-definitions/globalTypes.PluginSecurity.d.luau \
            --output "$ROBLOX_TYPES"

          rojo sourcemap test.project.json \
            --output "$SOURCEMAP" \
            --include-non-scripts

          luau-lsp analyze \
            --platform=roblox \
            --definitions="$ROBLOX_TYPES" \
            --sourcemap="$SOURCEMAP" \
            --ignore='roblox_packages/**' \
            src/init.luau \
            src/atlas.luau \
            src/shared.luau

      - name: Build and inspect package archive
        run: |
          PUBLISH_LOG="$RUNNER_TEMP/pesde-publish-dry-run.log"
          set -o pipefail

          if pesde publish --dry-run --yes --no-verify 2>&1 | tee "$PUBLISH_LOG"; then
            PUBLISH_STATUS=0
          else
            PUBLISH_STATUS=$?
          fi

          if [ "$PUBLISH_STATUS" -ne 0 ]; then
            echo "::error::pesde publish --dry-run exited with status $PUBLISH_STATUS."
            exit "$PUBLISH_STATUS"
          fi

          if grep -Fq "error occurred publishing" "$PUBLISH_LOG"; then
            echo "::error::pesde reported a dry-run publishing error but returned exit code 0."
            exit 1
          fi

          cat > "$RUNNER_TEMP/expected-package-files.txt" <<'EOF'
          LICENSE.md
          README.md
          pesde.toml
          src/atlas.luau
          src/init.luau
          src/shared.luau
          EOF

          tar -tzf package.tar.gz | LC_ALL=C sort > "$RUNNER_TEMP/actual-package-files.txt"
          if ! diff -u "$RUNNER_TEMP/expected-package-files.txt" "$RUNNER_TEMP/actual-package-files.txt"; then
            echo "::error::The pesde archive contains unexpected or missing files."
            exit 1
          fi

  create-release:
    name: Create Draft Release
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          CHANGELOG_VERSION="${TAG#supercorner-fusion03-}"
          VERSION="${TAG#supercorner-fusion03-v}"

          CHANGELOG=$(awk -v tag="$CHANGELOG_VERSION" '
            BEGIN { found=0 }
            /^# / {
              if (found) exit
              if ($0 == "# " tag) { found=1; next }
            }
            found { print }
          ' supercorner_fusion03/CHANGELOG.md | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}')

          if [ -z "$CHANGELOG" ]; then
            echo "::error::No changelog entry found for $CHANGELOG_VERSION in CHANGELOG.md"
            exit 1
          fi

          CHANGELOG=$(printf '%s' "$CHANGELOG" | sed 's/^#/##/')
          PESDE_URL="https://pesde.dev/packages/cameronpcampbell/supercorner_fusion03"

          cat > /tmp/release_body.md << EOF
          # Changelog
          ${CHANGELOG}

          ---

          # pesde
          [View Supercorner Fusion03 on pesde](${PESDE_URL}).

          \`\`\`sh
          pesde add cameronpcampbell/supercorner_fusion03@${VERSION} -t roblox
          \`\`\`

          Or add it directly to \`pesde.toml\`:

          \`\`\`toml
          [dependencies]
          supercorner_fusion03 = { name = "cameronpcampbell/supercorner_fusion03", version = "^${VERSION}", target = "roblox" }
          \`\`\`
          EOF

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists. Updating."
            gh release edit "$TAG" --draft --title "Supercorner Fusion03 v${VERSION}" --notes-file /tmp/release_body.md
          else
            gh release create "$TAG" --draft --verify-tag --title "Supercorner Fusion03 v${VERSION}" --notes-file /tmp/release_body.md
          fi

  publish-package:
    name: Publish to pesde
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: supercorner_fusion03
    steps:
      - uses: actions/checkout@v6

      - name: Install Rokit toolchain
        uses: CompeyDev/setup-rokit@v0.1.2
        with:
          path: supercorner_fusion03

      - name: Install pesde
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          INSTALL_ROOT="$RUNNER_TEMP/pesde"
          mkdir -p "$INSTALL_ROOT" "$INSTALL_ROOT/bin" "$INSTALL_ROOT/extracted"
          gh release download "$PESDE_RELEASE" \
            --repo pesde-pkg/pesde \
            --pattern "*linux-x86_64.zip" \
            --dir "$INSTALL_ROOT"

          ARCHIVE="$(find "$INSTALL_ROOT" -maxdepth 1 -type f -name '*linux-x86_64.zip' -print -quit)"
          if [ -z "$ARCHIVE" ]; then
            echo "::error::Could not find the downloaded pesde archive."
            exit 1
          fi

          unzip -q "$ARCHIVE" -d "$INSTALL_ROOT/extracted"
          PESDE_BIN="$(find "$INSTALL_ROOT/extracted" -type f -name pesde -print -quit)"
          if [ -z "$PESDE_BIN" ]; then
            echo "::error::Could not find the pesde binary in the downloaded archive."
            exit 1
          fi

          install -m 0755 "$PESDE_BIN" "$INSTALL_ROOT/bin/pesde"
          echo "$INSTALL_ROOT/bin" >> "$GITHUB_PATH"

          EXPECTED_VERSION="${PESDE_RELEASE#v}"
          EXPECTED_VERSION="${EXPECTED_VERSION%%+*}"
          ACTUAL_VERSION="$("$INSTALL_ROOT/bin/pesde" -v)"
          if [ "$ACTUAL_VERSION" != "pesde $EXPECTED_VERSION" ]; then
            echo "::error::Expected pesde $EXPECTED_VERSION, got $ACTUAL_VERSION."
            exit 1
          fi
          printf '%s\n' "$ACTUAL_VERSION"

      - name: Authenticate with pesde
        env:
          PESDE_TOKEN: ${{ secrets.PESDE_TOKEN }}
        run: |
          if [ -z "$PESDE_TOKEN" ]; then
            echo "::error::The PESDE_TOKEN repository secret is not configured."
            exit 1
          fi

          pesde auth login --token "$PESDE_TOKEN"
          pesde auth whoami

      - name: Publish package
        run: |
          PUBLISH_LOG="$RUNNER_TEMP/pesde-publish.log"
          set -o pipefail

          if pesde publish --yes --no-verify 2>&1 | tee "$PUBLISH_LOG"; then
            PUBLISH_STATUS=0
          else
            PUBLISH_STATUS=$?
          fi

          if [ "$PUBLISH_STATUS" -ne 0 ]; then
            echo "::error::pesde publish exited with status $PUBLISH_STATUS."
            exit "$PUBLISH_STATUS"
          fi

          if grep -Fq "error occurred publishing" "$PUBLISH_LOG"; then
            echo "::error::pesde reported a publishing error but returned exit code 0."
            exit 1
          fi

  publish-release:
    name: Publish GitHub Release
    needs: publish-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
