name = "cameronpcampbell/supercorner_fusion03"
version = "0.1.2"
description = "Fusion 0.3 wrapper for Supercorner (A figma-inspired alternative to Roblox's UICorner)."
license = "MIT"
authors = ["Cameron P Campbell"]
repository = "https://github.com/cameronpcampbell/supercorner"

includes = [
    "pesde.toml",
    "README.md",
    "LICENSE.md",
    "src/**/*.luau",
]

[target]
environment = "roblox"
lib = "src/init.luau"
build_files = ["src"]

[indices]
default = "https://github.com/pesde-pkg/index"

[wally_indices]
default = "https://github.com/UpliftGames/wally-index"

[engines]
lune = "^0.10.4"

[scripts]
roblox_sync_config_generator = { path = ".pesde/scripts/roblox_sync_config_generator.luau", runtime = "lune" }
sourcemap_generator = { path = ".pesde/scripts/sourcemap_generator.luau", runtime = "lune" }

[dev_dependencies]
scripts = { name = "pesde/scripts_rojo", version = "^0.2.0", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.5.1", target = "lune" }

[dependencies]
supercorner = { name = "cameronpcampbell/supercorner", version = "^0.1.2", target = "roblox" }
fusion = { wally = "elttob/fusion", version = "0.3.0" }
